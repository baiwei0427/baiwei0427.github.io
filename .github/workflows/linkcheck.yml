name: Link Check

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 9 * * 1'  # Every Monday 9am UTC
  workflow_dispatch:

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install lychee
        run: |
          curl -sL https://github.com/lycheeverse/lychee/releases/latest/download/lychee-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv lychee /usr/local/bin/

      - name: Check links
        run: |
          lychee \
            --exclude "linkedin\.com" \
            --exclude "usenix\.org" \
            --exclude "dl\.acm\.org" \
            --exclude "scholar\.google" \
            --exclude "facebook\.com" \
            --timeout 15 \
            --max-retries 2 \
            --format markdown \
            --output link-report.md \
            '*.html' || true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-report
          path: link-report.md

      - name: Fail on broken links
        run: |
          if grep -q "✗" link-report.md 2>/dev/null; then
            echo "❌ Broken links found!"
            grep "✗" link-report.md
            exit 1
          else
            echo "✅ All links OK"
          fi
