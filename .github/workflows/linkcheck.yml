name: Link Check

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 9 * * 1'  # Every Monday 9am UTC
  workflow_dispatch:

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: |
            --exclude "linkedin\.com"
            --exclude "usenix\.org"
            --exclude "dl\.acm\.org"
            --exclude "scholar\.google"
            --exclude "facebook\.com"
            --timeout 15
            --max-retries 2
            '*.html'
          fail: false
          output: link-report.md

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: link-report
          path: link-report.md
